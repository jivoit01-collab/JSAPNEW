name: Deploy

on:
workflow_dispatch:

concurrency:
group: jsap-production-deploy
cancel-in-progress: false

jobs:
deploy:
runs-on: ubuntu-latest

```
env:
  SSH_HOST: ${{ secrets.HOST }}
  SSH_USER: ${{ secrets.USERNAME }}
  SSH_PASSWORD: ${{ secrets.PASSWORD }}
  SSH_PORT: ${{ secrets.PORT }}
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

steps:
  - name: Checkout Main Branch
    uses: actions/checkout@v4
    with:
      ref: main

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: ${{ vars.DOTNET_VERSION }}

  - name: Cache NuGet Packages
    uses: actions/cache@v4
    with:
      path: ~/.nuget/packages
      key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
      restore-keys: |
        nuget-${{ runner.os }}-

  - name: Restore Packages
    run: dotnet restore JSAPNEW.csproj

  - name: Publish Project
    run: |
      dotnet publish JSAPNEW.csproj \
        --configuration Release \
        --no-restore \
        --output ./publish \
        -p:DebugType=None \
        -p:DebugSymbols=false

  - name: Check Publish Output
    run: |
      echo "CURRENT DIRECTORY"
      pwd

      echo "PUBLISH FOLDER"
      ls -la ./publish

      echo "VERIFY PUBLISH IS NOT EMPTY"
      test "$(ls -A ./publish)" || (echo "Publish folder is empty" && exit 1)

  - name: Install sshpass
    run: |
      sudo apt-get update
      sudo apt-get install -y sshpass

  - name: Compress Publish Folder Fast
    run: |
      tar -cf - -C ./publish . | gzip -1 > publish.tar.gz
      echo "TAR FILE CREATED"
      ls -lh publish.tar.gz

  - name: Test SSH Connection
    run: |
      sshpass -p "$SSH_PASSWORD" ssh \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -p "$SSH_PORT" \
        "$SSH_USER@$SSH_HOST" \
        "powershell -NoProfile -Command \"Write-Host 'SSH connection successful'\""

  - name: Stop IIS Website And Prepare Temp Folders
    run: |
      sshpass -p "$SSH_PASSWORD" ssh \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -p "$SSH_PORT" \
        "$SSH_USER@$SSH_HOST" \
        'powershell -NoProfile -ExecutionPolicy Bypass -Command -' <<'PS'
      $ErrorActionPreference = "Stop"

      Import-Module WebAdministration

      $Live = "C:\LiveProjects\JSAP"
      $TempRoot = "C:\LiveProjects\temp"
      $PublishTemp = "C:\LiveProjects\temp\Jsap-publish"
      $BackupRoot = "C:\LiveProjects\temp\Jsap-backup"
      $TarPath = "C:\LiveProjects\temp\publish.tar.gz"

      Stop-Website -Name "JSAP Test" -ErrorAction SilentlyContinue
      Stop-Service -Name "jsapnew" -Force -ErrorAction SilentlyContinue
      Start-Sleep -Seconds 3

      New-Item -ItemType Directory -Path $Live -Force | Out-Null
      New-Item -ItemType Directory -Path $TempRoot -Force | Out-Null
      New-Item -ItemType Directory -Path $PublishTemp -Force | Out-Null
      New-Item -ItemType Directory -Path $BackupRoot -Force | Out-Null

      Remove-Item "$PublishTemp\*" -Recurse -Force -ErrorAction SilentlyContinue

      if (Test-Path $TarPath) {
          Remove-Item $TarPath -Force -ErrorAction SilentlyContinue
      }

      Write-Host "Website stopped"
      Write-Host "Service stopped"
      Write-Host "Temp publish folder cleaned"
      Write-Host "Old tar file removed"
      PS

  - name: Upload Publish TAR To Server
    run: |
      sshpass -p "$SSH_PASSWORD" scp \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -P "$SSH_PORT" \
        publish.tar.gz \
        "$SSH_USER@$SSH_HOST:C:/LiveProjects/temp/publish.tar.gz"

  - name: Extract Backup Deploy And Restart
    run: |
      sshpass -p "$SSH_PASSWORD" ssh \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -p "$SSH_PORT" \
        "$SSH_USER@$SSH_HOST" \
        'powershell -NoProfile -ExecutionPolicy Bypass -Command -' <<'PS'
      $ErrorActionPreference = "Stop"

      Import-Module WebAdministration

      $Live = "C:\LiveProjects\JSAP"
      $PublishTemp = "C:\LiveProjects\temp\Jsap-publish"
      $BackupRoot = "C:\LiveProjects\temp\Jsap-backup"
      $TarPath = "C:\LiveProjects\temp\publish.tar.gz"

      $Timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
      $BackupFile = Join-Path $BackupRoot "JSAP_backup_$Timestamp.tar.gz"

      if (!(Test-Path $Live)) {
          New-Item -ItemType Directory -Path $Live -Force | Out-Null
      }

      if (!(Test-Path $TarPath)) {
          throw "Publish tar not found: $TarPath"
      }

      Remove-Item "$PublishTemp\*" -Recurse -Force -ErrorAction SilentlyContinue

      Write-Host "Extracting publish tar..."
      tar -xzf $TarPath -C $PublishTemp

      if (!(Test-Path "$PublishTemp\*")) {
          throw "Publish temp folder is empty after extract: $PublishTemp"
      }

      $ProtectedFiles = @(
          "appsettings.json",
          "appsettings.Production.json",
          "web.config",
          ".env"
      )

      $ProtectedFolders = @(
          "wwwroot",
          "Logs",
          "logs",
          "Uploads",
          "uploads",
          "App_Data",
          "Storage",
          "storage",
          "UserFiles",
          "userfiles"
      )

      Write-Host "Creating compressed backup of replaceable files only..."

      $TarExcludes = @(
          "--exclude=appsettings.json",
          "--exclude=appsettings.Production.json",
          "--exclude=web.config",
          "--exclude=.env",
          "--exclude=wwwroot",
          "--exclude=Logs",
          "--exclude=logs",
          "--exclude=Uploads",
          "--exclude=uploads",
          "--exclude=App_Data",
          "--exclude=Storage",
          "--exclude=storage",
          "--exclude=UserFiles",
          "--exclude=userfiles"
      )

      if (Test-Path "$Live\*") {
          tar -czf $BackupFile -C $Live @TarExcludes .
          Write-Host "Backup created at: $BackupFile"
      } else {
          Write-Host "Live folder is empty. Backup skipped."
      }

      Write-Host "Deploying new files with robocopy mirror mode..."

      $DeployArgs = @(
          $PublishTemp,
          $Live,
          "/MIR",
          "/MT:16",
          "/R:2",
          "/W:2",
          "/NFL",
          "/NDL",
          "/NJH",
          "/NJS",
          "/NC",
          "/NS",
          "/NP"
      )

      foreach ($file in $ProtectedFiles) {
          $DeployArgs += "/XF"
          $DeployArgs += $file
      }

      foreach ($folder in $ProtectedFolders) {
          $DeployArgs += "/XD"
          $DeployArgs += $folder
      }

      robocopy @DeployArgs

      if ($LASTEXITCODE -gt 7) {
          throw "Deploy robocopy failed with exit code $LASTEXITCODE"
      }

      $global:LASTEXITCODE = 0

      Remove-Item "$PublishTemp\*" -Recurse -Force -ErrorAction SilentlyContinue
      Remove-Item $TarPath -Force -ErrorAction SilentlyContinue

      Start-Website -Name "JSAP Test"
      Start-Service -Name "jsapnew"

      Write-Host "Deployment Completed Successfully"
      Write-Host "Backup File: $BackupFile"
      Write-Host "Live Location: $Live"
      PS
```
