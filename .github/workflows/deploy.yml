name: Deploy

on:
workflow_dispatch:

jobs:
build-and-deploy:
runs-on: windows-latest

```
steps:
  - name: Checkout Main Branch
    uses: actions/checkout@v4
    with:
      ref: main

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: ${{ vars.DOTNET_VERSION }}

  - name: Find Project Files
    shell: powershell
    run: |
      Write-Host "Searching for .csproj files..."
      Get-ChildItem -Recurse -Filter *.csproj

  - name: Restore Packages
    run: dotnet restore

  - name: Build Project
    run: dotnet build --configuration Release --no-restore

  - name: Publish Project
    shell: powershell
    run: |
      dotnet publish --configuration Release --output JSAPNEW

  - name: Verify Publish Folder
    shell: powershell
    run: |
      Write-Host "Checking JSAPNEW Folder"
      Test-Path JSAPNEW

      if (Test-Path JSAPNEW)
      {
        Get-ChildItem JSAPNEW -Recurse
      }

  - name: Create Deployment ZIP
    shell: powershell
    run: |
      Compress-Archive `
        -Path ".\JSAPNEW\*" `
        -DestinationPath "JSAPNEW.zip" `
        -Force

  - name: Upload Package to Server
    uses: appleboy/scp-action@v0.1.7
    with:
      host: ${{ secrets.HOST }}
      username: ${{ secrets.USERNAME }}
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      port: ${{ secrets.PORT }}
      source: "JSAPNEW.zip"
      target: "C:/Temp"

  - name: Deploy to Server
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.HOST }}
      username: ${{ secrets.USERNAME }}
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      port: ${{ secrets.PORT }}
      script: |
        powershell -Command "

        Import-Module WebAdministration

        Stop-Website -Name 'JSAP Test'

        Stop-Service -Name 'jsapnew' -Force

        Start-Sleep -Seconds 10

        \$BackupFolder = 'C:\Backup\JSAP_' + (Get-Date -Format 'yyyyMMdd_HHmmss')

        New-Item -ItemType Directory -Path \$BackupFolder -Force

        Copy-Item `
          'C:\LiveProjects\JSAPTEST\*' `
          \$BackupFolder `
          -Recurse `
          -Force

        Remove-Item `
          'C:\LiveProjects\JSAPTEST\*' `
          -Recurse `
          -Force

        if(Test-Path 'C:\Temp\Deploy')
        {
          Remove-Item `
            'C:\Temp\Deploy' `
            -Recurse `
            -Force
        }

        Expand-Archive `
          'C:\Temp\JSAPNEW.zip' `
          'C:\Temp\Deploy' `
          -Force

        Copy-Item `
          'C:\Temp\Deploy\*' `
          'C:\LiveProjects\JSAPTEST' `
          -Recurse `
          -Force

        Start-Website -Name 'JSAP Test'

        Start-Service -Name 'jsapnew'


