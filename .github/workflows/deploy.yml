name: Deploy

on:
workflow_dispatch:

jobs:
build-and-deploy:
runs-on: windows-latest

```
steps:
  - name: Checkout Main Branch
    uses: actions/checkout@v4
    with:
      ref: main

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: ${{ vars.DOTNET_VERSION }}

  - name: Find Project Files
    shell: powershell
    run: |
      Write-Host "===== CSPROJ FILES ====="
      Get-ChildItem -Recurse -Filter *.csproj

      Write-Host "===== SOLUTION FILES ====="
      Get-ChildItem -Recurse -Filter *.sln

      Write-Host "===== CURRENT DIRECTORY ====="
      Get-Location

      Write-Host "===== REPOSITORY STRUCTURE ====="
      Get-ChildItem -Recurse

  - name: Restore Packages
    run: dotnet restore

  - name: Build Project
    run: dotnet build --configuration Release

  - name: Publish Project
    run: dotnet publish --configuration Release --output JSAPNEW

  - name: Verify Publish
    shell: powershell
    run: |
      Write-Host "Checking folders after publish"

      Get-ChildItem

      if(Test-Path "JSAPNEW")
      {
          Write-Host "JSAPNEW folder exists"
          Get-ChildItem "JSAPNEW" -Recurse
      }
      else
      {
          Write-Host "JSAPNEW folder NOT FOUND"
      }

  - name: Create Deployment ZIP
    shell: powershell
    run: |
      Compress-Archive `
        -Path ".\JSAPNEW\*" `
        -DestinationPath "JSAPNEW.zip" `
        -Force
```
