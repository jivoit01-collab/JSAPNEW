name: Deploy

on:
workflow_dispatch:

jobs:
deploy:
runs-on: ubuntu-latest

```
env:
  SSH_HOST: ${{ secrets.HOST }}
  SSH_USER: ${{ secrets.USERNAME }}
  SSH_PASSWORD: ${{ secrets.PASSWORD }}
  SSH_PORT: ${{ secrets.PORT }}
  TEMP_PATH: C:\LiveProjects\JSAPTestDeployTemp
  LIVE_PATH: C:\LiveProjects\JSAP Test

steps:
  - name: Checkout Main Branch
    uses: actions/checkout@v4
    with:
      ref: main

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: ${{ vars.DOTNET_VERSION }}

  - name: Restore Packages
    run: dotnet restore JSAPNEW.csproj

  - name: Build Project
    run: dotnet build JSAPNEW.csproj --configuration Release --no-restore

  - name: Publish Project
    run: dotnet publish JSAPNEW.csproj --configuration Release --output ./publish

  - name: Check Publish Output
    run: |
      echo "CURRENT DIRECTORY"
      pwd

      echo "FILES"
      ls -la

      echo "PUBLISH FOLDER"
      ls -la ./publish

      echo "VERIFY PUBLISH IS NOT EMPTY"
      test "$(ls -A ./publish)" || (echo "Publish folder is empty" && exit 1)

  - name: Install sshpass
    run: |
      sudo apt-get update
      sudo apt-get install -y sshpass

  - name: Test SSH Connection
    run: |
      sshpass -p "$SSH_PASSWORD" ssh \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -p "$SSH_PORT" \
        "$SSH_USER@$SSH_HOST" \
        "powershell -NoProfile -Command \"Write-Host 'SSH connection successful'\""

  - name: Stop IIS Website and Windows Service
    run: |
      sshpass -p "$SSH_PASSWORD" ssh \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -p "$SSH_PORT" \
        "$SSH_USER@$SSH_HOST" \
        "powershell -NoProfile -Command \"
        Import-Module WebAdministration

        Write-Host 'Stopping IIS Website...'
        Stop-Website -Name 'JSAP Test' -ErrorAction SilentlyContinue

        Write-Host 'Stopping Windows Service...'
        Stop-Service -Name 'jsapnew' -Force -ErrorAction SilentlyContinue

        Start-Sleep -Seconds 5

        Write-Host 'Preparing temporary deploy folder...'
        if (Test-Path '$env:TEMP_PATH') {
          Remove-Item '$env:TEMP_PATH\*' -Recurse -Force -ErrorAction SilentlyContinue
        } else {
          New-Item -ItemType Directory -Path '$env:TEMP_PATH' -Force
        }

        Write-Host 'Temporary folder ready'
        \""

  - name: Upload Publish Files To Temp Folder
    run: |
      sshpass -p "$SSH_PASSWORD" scp \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -P "$SSH_PORT" \
        -r ./publish/* \
        "$SSH_USER@$SSH_HOST:C:/LiveProjects/JSAPTestDeployTemp/"

  - name: Move Files To Live Folder And Restart
    run: |
      sshpass -p "$SSH_PASSWORD" ssh \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -p "$SSH_PORT" \
        "$SSH_USER@$SSH_HOST" \
        "powershell -NoProfile -Command \"
        Import-Module WebAdministration

        Write-Host 'Preparing live folder...'
        if (!(Test-Path '$env:LIVE_PATH')) {
          New-Item -ItemType Directory -Path '$env:LIVE_PATH' -Force
        }

        Write-Host 'Cleaning old live files...'
        Remove-Item '$env:LIVE_PATH\*' -Recurse -Force -ErrorAction SilentlyContinue

        Write-Host 'Copying new files to live folder...'
        Copy-Item '$env:TEMP_PATH\*' '$env:LIVE_PATH\' -Recurse -Force

        Write-Host 'Cleaning temporary folder...'
        Remove-Item '$env:TEMP_PATH\*' -Recurse -Force -ErrorAction SilentlyContinue

        Write-Host 'Starting IIS Website...'
        Start-Website -Name 'JSAP Test'

        Write-Host 'Starting Windows Service...'
        Start-Service -Name 'jsapnew'

        Write-Host 'Deployment Completed Successfully'
        \""
```
