name: JSAPNEW Deployment

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: windows-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ vars.DOTNET_VERSION }}

      - name: Restore Packages
        run: dotnet restore

      - name: Build Project
        run: dotnet build --configuration Release --no-restore

      - name: Publish Project
        run: |
          dotnet publish -c Release -o publish

      - name: Create ZIP
        run: |
          Compress-Archive `
          -Path publish\* `
          -DestinationPath publish.zip

      - name: Copy ZIP to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          source: "publish.zip"
          target: "C:/Temp"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |

            Import-Module WebAdministration

            Write-Host "Stopping IIS Website..."

            Stop-Website -Name "JSAP Test"

            Write-Host "Stopping Windows Service..."

            Stop-Service -Name "jsapnew" -Force

            Start-Sleep -Seconds 10

            Write-Host "Cleaning Old Files..."

            Remove-Item `
              "C:\LiveProjects\JSAP\*" `
              -Recurse `
              -Force

            Write-Host "Extracting New Publish Files..."

            Expand-Archive `
              "C:\Temp\publish.zip" `
              "C:\Temp\Deploy" `
              -Force

            Copy-Item `
              "C:\Temp\Deploy\*" `
              "C:\LiveProjects\JSAP" `
              -Recurse `
              -Force

            Write-Host "Starting IIS Website..."

            Start-Website -Name "JSAP Test"

            Write-Host "Starting Windows Service..."

            Start-Service -Name "jsapnew"

            Write-Host "Deployment Completed Successfully"
