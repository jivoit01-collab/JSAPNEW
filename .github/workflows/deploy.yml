


name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USERNAME }}
      SSH_PASSWORD: ${{ secrets.PASSWORD }}
      SSH_PORT: ${{ secrets.PORT }}

    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ vars.DOTNET_VERSION }}

      - name: Restore Packages
        run: dotnet restore JSAPNEW.csproj

      - name: Build Project
        run: dotnet build JSAPNEW.csproj --configuration Release --no-restore

      - name: Publish Project
        run: dotnet publish JSAPNEW.csproj --configuration Release --output ./publish

      - name: Check Publish Output
        run: |
          echo "CURRENT DIRECTORY"
          pwd

          echo "FILES"
          ls -la

          echo "PUBLISH FOLDER"
          ls -la ./publish

          echo "VERIFY PUBLISH IS NOT EMPTY"
          test "$(ls -A ./publish)" || (echo "Publish folder is empty" && exit 1)

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Test SSH Connection
        run: |
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "powershell -NoProfile -Command \"Write-Host 'SSH connection successful'\""

      - name: Stop IIS Website And Prepare Temp Folders
        run: |
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            'powershell -NoProfile -ExecutionPolicy Bypass -Command -' <<'PS'
          Import-Module WebAdministration

          Stop-Website -Name "JSAP Test" -ErrorAction SilentlyContinue
          Stop-Service -Name "jsapnew" -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

          $Live = "C:\LiveProjects\JSAP"
          $PublishTemp = "C:\LiveProjects\temp\Jsap-publish"
          $BackupRoot = "C:\LiveProjects\temp\Jsap-backup"

          New-Item -ItemType Directory -Path $Live -Force | Out-Null
          New-Item -ItemType Directory -Path $PublishTemp -Force | Out-Null
          New-Item -ItemType Directory -Path $BackupRoot -Force | Out-Null

          Remove-Item "$PublishTemp\*" -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "Website stopped"
          Write-Host "Service stopped"
          Write-Host "Temp publish folder cleaned"
          Write-Host "Backup folder is safe"
          PS

      - name: Upload Publish Files To Temp Publish Folder
        run: |
          sshpass -p "$SSH_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P "$SSH_PORT" \
            -r ./publish/* \
            "$SSH_USER@$SSH_HOST:C:/LiveProjects/temp/Jsap-publish/"

      - name: Backup Live Folder Replace Files And Restart
        run: |
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            'powershell -NoProfile -ExecutionPolicy Bypass -Command -' <<'PS'
          $ErrorActionPreference = "Stop"

          Import-Module WebAdministration

          $Live = "C:\LiveProjects\JSAP"
          $PublishTemp = "C:\LiveProjects\temp\Jsap-publish"
          $BackupRoot = "C:\LiveProjects\temp\Jsap-backup"

          $Timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $BackupPath = Join-Path $BackupRoot $Timestamp

          if (!(Test-Path $Live)) {
              New-Item -ItemType Directory -Path $Live -Force | Out-Null
          }

          if (!(Test-Path $PublishTemp)) {
              throw "Publish temp folder not found: $PublishTemp"
          }

          if (!(Test-Path "$PublishTemp\*")) {
              throw "Publish temp folder is empty: $PublishTemp"
          }

          New-Item -ItemType Directory -Path $BackupPath -Force | Out-Null

          if (Test-Path "$Live\*") {
              Copy-Item "$Live\*" $BackupPath -Recurse -Force
              Write-Host "Backup created successfully at: $BackupPath"
          } else {
              Write-Host "Live folder is empty. Empty backup folder created at: $BackupPath"
          }

          $ProtectedFiles = @(
              "appsettings.json",
              "appsettings.Production.json",
              "web.config",
              ".env"
          )

          $ProtectedFolders = @(
              "wwwroot",
              "Logs",
              "logs",
              "Uploads",
              "uploads",
              "App_Data",
              "Storage",
              "storage",
              "UserFiles",
              "userfiles"
          )

          Write-Host "Removing old live files except protected files and folders..."

          Get-ChildItem -Path $Live -Force | Where-Object {
              ($ProtectedFiles -notcontains $_.Name) -and
              ($ProtectedFolders -notcontains $_.Name)
          } | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "Copying new publish files to live folder..."

          $RobocopyArgs = @(
              $PublishTemp,
              $Live,
              "/E",
              "/NFL",
              "/NDL",
              "/NJH",
              "/NJS",
              "/NC",
              "/NS",
              "/NP"
          )

          foreach ($file in $ProtectedFiles) {
              $RobocopyArgs += "/XF"
              $RobocopyArgs += $file
          }

          foreach ($folder in $ProtectedFolders) {
              $RobocopyArgs += "/XD"
              $RobocopyArgs += $folder
          }

          robocopy @RobocopyArgs

          if ($LASTEXITCODE -gt 7) {
              throw "Robocopy failed with exit code $LASTEXITCODE"
          }

          $global:LASTEXITCODE = 0

          Remove-Item "$PublishTemp\*" -Recurse -Force -ErrorAction SilentlyContinue

          Start-Website -Name "JSAP Test"
          Start-Service -Name "jsapnew"

          Write-Host "Deployment Completed Successfully"
          Write-Host "Backup Location: $BackupPath"
          Write-Host "Live Location: $Live"
          PS



