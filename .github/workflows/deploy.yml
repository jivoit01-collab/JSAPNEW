name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ vars.DOTNET_VERSION }}

      - name: Restore Packages
        run: dotnet restore JSAPNEW.csproj

      - name: Build Project
        run: dotnet build JSAPNEW.csproj --configuration Release --no-restore

      - name: Publish Project
        run: dotnet publish JSAPNEW.csproj --configuration Release --output ./publish

      - name: Check Publish Output
        run: |
          echo "CURRENT DIRECTORY"
          pwd

          echo "FILES"
          ls -la

          echo "PUBLISH FOLDER"
          ls -la ./publish

          echo "VERIFY PUBLISH IS NOT EMPTY"
          test "$(ls -A ./publish)" || (echo "Publish folder is empty" && exit 1)

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          command_timeout: 2m
          script: |
            powershell -Command "Write-Host 'SSH connection successful'"

      - name: Stop IIS Website and Windows Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            powershell -Command "
            Import-Module WebAdministration

            Write-Host 'Stopping IIS Website...'
            Stop-Website -Name 'JSAP Test' -ErrorAction SilentlyContinue

            Write-Host 'Stopping Windows Service...'
            Stop-Service -Name 'jsapnew' -Force -ErrorAction SilentlyContinue

            Start-Sleep -Seconds 5

            Write-Host 'Preparing temporary deploy folder...'
            if (Test-Path 'C:\LiveProjects\JSAPTestDeployTemp') {
              Remove-Item 'C:\LiveProjects\JSAPTestDeployTemp\*' -Recurse -Force -ErrorAction SilentlyContinue
            } else {
              New-Item -ItemType Directory -Path 'C:\LiveProjects\JSAPTestDeployTemp' -Force
            }

            Write-Host 'Temporary deploy folder ready'
            "

      - name: Upload Publish Files To Temp Folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          command_timeout: 10m
          source: "./publish"
          target: "C:/LiveProjects/JSAPTestDeployTemp"
          strip_components: 1

      - name: Move Files To Live Folder And Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            powershell -Command "
            Import-Module WebAdministration

            Write-Host 'Preparing live folder...'
            if (!(Test-Path 'C:\LiveProjects\JSAP Test')) {
              New-Item -ItemType Directory -Path 'C:\LiveProjects\JSAP Test' -Force
            }

            Write-Host 'Cleaning old live files...'
            Remove-Item 'C:\LiveProjects\JSAP Test\*' -Recurse -Force -ErrorAction SilentlyContinue

            Write-Host 'Copying new publish files...'
            Copy-Item 'C:\LiveProjects\JSAPTestDeployTemp\*' 'C:\LiveProjects\JSAP Test\' -Recurse -Force

            Write-Host 'Cleaning temporary deploy folder...'
            Remove-Item 'C:\LiveProjects\JSAPTestDeployTemp\*' -Recurse -Force -ErrorAction SilentlyContinue

            Write-Host 'Starting IIS Website...'
            Start-Website -Name 'JSAP Test'

            Write-Host 'Starting Windows Service...'
            Start-Service -Name 'jsapnew'

            Write-Host 'Deployment Completed Successfully'
            "
